[versions]
commons-text = "1.15.0"
common-utils = "2.6.1"
css = "2026.3.2"
junit = "4.13.2"
kotest = "6.1.4"
kotlin = "2.3.10"
kotlinter = "5.4.2"
ktor = "3.4.1"
logback = "1.5.32"
logging = "8.0.01"
plotly = "0.7.1.1"
serialization = "1.10.0"
shadow = "8.3.7"
srcref = "2.0.3"
versions-plugin = "0.53.0"

[libraries]
commons-text = { module = "org.apache.commons:commons-text", version.ref = "commons-text" }
common-utils-core = { module = "com.github.pambrose.common-utils:core-utils", version.ref = "common-utils" }
common-utils-ktor-server = { module = "com.github.pambrose.common-utils:ktor-server-utils", version.ref = "common-utils" }
junit = { module = "junit:junit", version.ref = "junit" }
kotest-runner-junit5 = { module = "io.kotest:kotest-runner-junit5", version.ref = "kotest" }
kotlin-css = { module = "org.jetbrains.kotlin-wrappers:kotlin-css", version.ref = "css" }
kotlin-logging = { module = "io.github.oshai:kotlin-logging-jvm", version.ref = "logging" }
kotlin-stdlib-common = { module = "org.jetbrains.kotlin:kotlin-stdlib-common", version.ref = "kotlin" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "serialization" }
ktor-client-cio = { module = "io.ktor:ktor-client-cio", version.ref = "ktor" }
ktor-client-core = { module = "io.ktor:ktor-client-core", version.ref = "ktor" }
ktor-server = { module = "io.ktor:ktor-server", version.ref = "ktor" }
ktor-server-call-logging = { module = "io.ktor:ktor-server-call-logging", version.ref = "ktor" }
ktor-server-cio = { module = "io.ktor:ktor-server-cio", version.ref = "ktor" }
ktor-server-compression = { module = "io.ktor:ktor-server-compression", version.ref = "ktor" }
ktor-server-html-builder = { module = "io.ktor:ktor-server-html-builder", version.ref = "ktor" }
ktor-server-sessions = { module = "io.ktor:ktor-server-sessions", version.ref = "ktor" }
logback = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
plotlykt-core = { module = "space.kscience:plotlykt-core", version.ref = "plotly" }
srcref = { module = "com.github.pambrose:srcref", version.ref = "srcref" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
kotlinter = { id = "org.jmailen.kotlinter", version.ref = "kotlinter" }
shadow = { id = "com.gradleup.shadow", version.ref = "shadow" }
versions = { id = "com.github.ben-manes.versions", version.ref = "versions-plugin" }
